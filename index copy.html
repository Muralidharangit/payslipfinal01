<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSCORP - Payroll Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap');

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            padding: 20px;
        }

        /* 1. HIDE PAYSLIP FROM SCREEN */
        #printable {
            display: none;
        }

        /* 2. TABLE STYLING */
        .dashboard-card {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .table thead th {
            background-color: #f8fafc;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: #64748b;
            border-top: none;
        }

        .btn-generate {
            background-color: #6366f1;
            color: white;
            border: none;
            font-size: 0.8rem;
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-generate:hover {
            background-color: #4f46e5;
            color: white;
        }

        /* 3. PAGINATION STYLING */
        .pagination-wrapper {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .page-btn {
            border: 1px solid #e2e8f0;
            background: white;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .page-btn.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }

        /* 4. PRINT-ONLY STYLING (Shows the slip only on paper/PDF) */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .dashboard-card,
            .no-print {
                display: none !important;
            }

            #printable {
                display: block !important;
                width: 210mm;
                padding: 15mm;
                margin: 0;
                height: auto;
            }

            .software-brand {
                color: #6366f1 !important;
                -webkit-print-color-adjust: exact;
            }

            .total-row {
                background: #1e293b !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                padding: 15px !important;
                border-radius: 6px;
            }

            .summary-badge {
                background: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                border: 1px solid #e2e8f0 !important;
            }
        }

        /* Standard Payslip Design Elements */
        .software-brand {
            color: #6366f1;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
        }

        .amount-font {
            font-family: 'Roboto Mono', monospace;
        }

        .summary-badge {
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="dashboard-card no-print">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>

                <h4 class="fw-bold mb-0">SYSCORP <span class="fw-light text-muted">Payroll</span></h4>
                <small class="text-muted">Software Division | Pondicherry</small>
            </div>
            <div id="page-label" class="badge bg-light text-dark border">Page 1</div>
        </div>

        <table class="table table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Employee Name</th>
                    <th>Designation</th>
                    <th>Status</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>
            <tbody id="employee-list">
            </tbody>
        </table>

        <div class="pagination-wrapper" id="pagination-controls"></div>
    </div>

    <div id="printable">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h2 class="fw-bold mb-0">SYSCORP</h2>
                <div class="software-brand">&lt;DEVELOPER_PAYROLL /&gt;</div>
                <small>JIPMER Main road, Pondicherry-605008</small>
            </div>
            <div class="text-end">
                <h6 class="text-muted text-uppercase small">Payslip Statement</h6>
                <h4 class="fw-bold" id="slip-month">JANUARY 2026</h4>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-7">
                <div class="summary-badge h-100" id="slip-summary"></div>
            </div>
            <div class="col-5">
                <div class="p-3 border rounded-3 h-100 bg-light">
                    <small class="text-muted text-uppercase fw-bold" style="font-size:0.6rem">Net Amount
                        Credited</small>
                    <h2 class="fw-bold amount-font" id="slip-net-top">₹ 0</h2>
                    <hr>
                    <div class="d-flex justify-content-between small">
                        <span>LOP: <b id="slip-lop">0</b></span>
                        <span>Paid Days: <b id="slip-paid">0</b></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-6">
                <h6 class="fw-bold border-bottom pb-2">EARNINGS</h6>
                <table class="table table-sm table-borderless small" id="slip-earnings"></table>
            </div>
            <div class="col-6">
                <h6 class="fw-bold border-bottom pb-2">DEDUCTIONS</h6>
                <table class="table table-sm table-borderless small" id="slip-deductions"></table>
            </div>
        </div>

        <div class="total-row d-flex justify-content-between align-items-center mb-3">
            <span class="fw-bold">TOTAL NET PAYABLE</span>
            <h3 class="mb-0 fw-bold amount-font" id="slip-net-final">₹ 0</h3>
        </div>

        <div class="mt-4">
            <small class="text-muted text-uppercase fw-bold" style="font-size:0.6rem">In Words</small>
            <p class="fw-bold border-top pt-1" id="slip-words"></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAOJIeY75b9atH-tHTZdJu8IpgbQh96bQ6km_HRqbpaUl0k0OX9JzO7AjRowuIrugEoa4871qSDdTG/pub?output=csv";
        let employees = [];
        let currentPage = 1;
        const perPage = 15;

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                employees = results.data.filter(row => row["Emp Name"]);
                updateTable();
            }
        });

        function updateTable() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const list = employees.slice(start, end);

            const tbody = document.getElementById("employee-list");
            tbody.innerHTML = "";

            list.forEach((emp, idx) => {
                const actualIdx = start + idx;
                tbody.innerHTML += `
            <tr>
                <td><code>#${emp["Emp.No"]}</code></td>
                <td class="fw-bold">${emp["Emp Name"]}</td>
                <td>${emp["Designation"]}</td>
                <td><span class="badge bg-success-subtle text-success">${emp["Status"]}</span></td>
                <td class="text-end">
                    <button class="btn-generate" onclick="prepareAndPrint(${actualIdx})">Print Payslip</button>
                </td>
            </tr>
        `;
            });

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(employees.length / perPage);
            const container = document.getElementById("pagination-controls");
            container.innerHTML = "";

            for (let i = 1; i <= totalPages; i++) {
                container.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            document.getElementById("page-label").innerText = `Page ${currentPage} of ${totalPages}`;
        }

        function goToPage(p) {
            currentPage = p;
            updateTable();
        }

        function prepareAndPrint(idx) {
            const emp = employees[idx];

            // Fill Summary
            const summaryKeys = ["Emp Name", "Designation", "Emp.No", "DOJ", "Status", "Working Days"];
            document.getElementById("slip-summary").innerHTML = summaryKeys.map(k => `
        <div class="row mb-1">
            <div class="col-5 text-muted small">${k}</div>
            <div class="col-7 fw-bold small">${emp[k] || '-'}</div>
        </div>
    `).join('');

            // Fill Figures
            document.getElementById("slip-lop").innerText = emp["LOP"] || "0";
            document.getElementById("slip-paid").innerText = emp["Paid Days"] || "0";

            // Earnings Table
            const earns = ["Earned Basic", "Earned HRA", "Earned Conv.", "Earned Med.", "Earned Other"];
            document.getElementById("slip-earnings").innerHTML = earns.map(e => `
        <tr><td>${e}</td><td class="text-end fw-bold">${(parseFloat(emp[e]) || 0).toLocaleString()}</td></tr>
    `).join('');

            // Deductions Table
            const deds = ["EPF", "ESI"];
            document.getElementById("slip-deductions").innerHTML = deds.map(d => `
        <tr><td>${d}</td><td class="text-end fw-bold">${(parseFloat(emp[d]) || 0).toLocaleString()}</td></tr>
    `).join('');

            const net = (parseFloat(emp["Earned Gross"]) || 0) - (parseFloat(emp["Total Deduct"]) || 0);
            document.getElementById("slip-net-top").innerText = "₹ " + net.toLocaleString();
            document.getElementById("slip-net-final").innerText = "₹ " + net.toLocaleString();
            document.getElementById("slip-words").innerText = "Indian Rupee " + net.toLocaleString() + " Only";

            // Trigger Print
            setTimeout(() => window.print(), 200);
        }
    </script>
</body>

</html>
